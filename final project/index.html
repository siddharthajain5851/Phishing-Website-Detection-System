<!DOCTYPE html>
<html>
<head>
  <title>Meghix Trinetra</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f1a;
      color: white;
      font-family: Arial;
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      animation: fade 2s ease-in-out infinite alternate;
    }

    @keyframes fade {
      from { opacity: 0.3; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>

<body>
  <div class="logo">
    👁️ Meghix Trinetra
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "index.html"; // your search page
    }, 8000); // 8 seconds
  </script>
</body>
</html>
