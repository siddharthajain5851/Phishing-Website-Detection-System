<!DOCTYPE html>
<html>
<head>
  <title>Meghix Trinetra</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#020617;
      font-family:'Orbitron', sans-serif;
      color:white;
      overflow:hidden;
    }

    .card {
      width:500px;
      padding:40px;
      border-radius:20px;
      text-align:center;
      background: rgba(10,20,40,0.7);
      backdrop-filter: blur(20px);
      border:1px solid rgba(0,255,255,0.3);
      box-shadow: 0 0 30px rgba(0,255,255,0.3);
      animation: fadeIn 1.5s ease;
    }

    .logo {
      font-size:32px;
      margin-bottom:10px;
      text-shadow:0 0 15px cyan;
    }

    .subtitle {
      font-size:12px;
      color:#00eaff;
      margin-bottom:25px;
    }

    .loading-text {
      font-size:13px;
      color:#aaa;
      margin-top:20px;
    }

    /* Progress bar */
    .progress-bar {
      width:100%;
      height:8px;
      background:#111;
      border-radius:10px;
      margin-top:20px;
      overflow:hidden;
    }

    .progress {
      height:100%;
      width:0%;
      background: linear-gradient(90deg,#00eaff,#00ffb3);
      animation: load 3s linear forwards;
    }

    @keyframes load {
      from { width:0%; }
      to { width:100%; }
    }

    @keyframes fadeIn {
      from { opacity:0; transform:scale(0.9); }
      to { opacity:1; transform:scale(1); }
    }

  </style>
</head>

<body>

<div class="card">
  <div class="logo">🧿 MEGHIX TRINETRA</div>
  <div class="subtitle">Cloud Defense AI</div>

  <div class="loading-text">Initializing Security Engine...</div>

  <div class="progress-bar">
    <div class="progress"></div>
  </div>

  <div class="loading-text">Redirecting to Login...</div>
</div>

<script>
  setTimeout(() => {
    window.location.href = "/login";
  }, 3000);
</script>

</body>
</html>
