<!DOCTYPE html>
<html>
<head>
  <title>Meghix Trinetra</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f1a;
      font-family: Arial;
      color: white;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }

    .logo {
      font-size: 60px;
      font-weight: bold;
    }

    .tagline {
      margin-top: 10px;
      color: #aaa;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">🧿 Meghix Trinetra</div>
    <div class="tagline">Cloud Defense AI</div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "/home";
    }, 3000);
  </script>

</body>
</html>
