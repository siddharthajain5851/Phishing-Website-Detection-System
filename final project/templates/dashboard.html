<!DOCTYPE html>
<html>
<head>
<title>Trinetra Dashboard</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Segoe UI';
    background:#050b18;
    color:white;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:rgba(10,15,30,0.98);
    border-right:1px solid rgba(0,255,255,0.2);
    transition:0.4s;
}

.sidebar.mini{ width:75px; }

.logo{
    text-align:center;
    padding:20px 10px;
}

.logo h2{ color:#00eaff; }

.sidebar.mini .logo h2,
.sidebar.mini .logo small{ display:none; }

.menu a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 18px;
    color:#ccc;
    text-decoration:none;
    margin:6px 10px;
    border-radius:10px;
}

.menu a:hover{
    background:rgba(0,255,255,0.15);
    color:#00eaff;
}

.menu a.active{
    background:rgba(0,255,255,0.2);
    color:#00eaff;
}

.sidebar.mini .menu a span{ display:none; }

/* MAIN */
.main{
    margin-left:250px;
    padding:20px;
    transition:0.4s;
}

.main.full{ margin-left:75px; }

.menu-btn{
    font-size:22px;
    cursor:pointer;
}

.title{
    text-align:center;
    margin-top:10px;
}

.title h1{ color:#00eaff; }

/* CARDS */
.tools{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:40px;
}

.card{
    width:300px;
    height:420px;
    border-radius:20px;
    padding:20px;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    backdrop-filter: blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card1{ border:1px solid #00eaff; }
.card2{ border:1px solid #a855f7; }
.card3{ border:1px solid #3b82f6; }

.btn{
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn1{background:#00eaff;color:black;}
.btn2{background:#a855f7;color:white;}
.btn3{background:#3b82f6;color:white;}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="logo">
        <h2>🧿 Meghix Trinetra</h2>
        <small>Cloud Defense AI</small>
    </div>

    <div class="menu">
        <a href="/dashboard" class="active"><i class="fas fa-home"></i><span>Dashboard</span></a>
        <a href="/home"><i class="fas fa-globe"></i><span>Phishing Tool</span></a>
        <a href="#"><i class="fas fa-clock"></i><span>History</span></a>
        <a href="#"><i class="fas fa-user"></i><span>Profile</span></a>
        <a href="#"><i class="fas fa-database"></i><span>Database</span></a>
        <a href="#"><i class="fas fa-cog"></i><span>Settings</span></a>
        <a href="/login"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="top">
    <span class="menu-btn" onclick="toggle()">☰</span>
</div>

<div class="title">
    <h1>TRINETRA DASHBOARD</h1>
    <p>AI Powered Cyber Security Suite</p>
</div>

<div class="tools">

<div class="card card1">
    <div>
        <div style="font-size:50px;">🔍</div>
        <h2>PHISHING SCANNER</h2>
        <p>Detect malicious URLs using AI</p>
    </div>
    <button class="btn btn1" onclick="location.href='/home'">OPEN →</button>
</div>

<div class="card card2">
    <div>
        <div style="font-size:50px;">🔒</div>
        <h2>COMING SOON</h2>
    </div>
    <button class="btn btn2">WAIT</button>
</div>

<div class="card card3">
    <div>
        <div style="font-size:50px;">🛡</div>
        <h2>COMING SOON</h2>
    </div>
    <button class="btn btn3">WAIT</button>
</div>

</div>

</div>

<script>
function toggle(){
    document.getElementById("sidebar").classList.toggle("mini");
    document.getElementById("main").classList.toggle("full");
}
</script>

</body>
</html>
