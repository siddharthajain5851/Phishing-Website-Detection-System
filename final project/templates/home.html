<!DOCTYPE html>
<html>
<head>
<title>Meghix Trinetra</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    height:100vh;
    font-family:'Orbitron', sans-serif;
    background:#020617;
    overflow:hidden;
    color:white;
}

canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.card {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:600px;
    padding:30px;
    border-radius:20px;
    background: rgba(10,20,40,0.7);
    backdrop-filter: blur(20px);
    border:1px solid rgba(0,255,255,0.3);
    box-shadow: 0 0 30px rgba(0,255,255,0.3);
    text-align:center;
}

.logo {
    font-size:26px;
}

.subtitle {
    font-size:12px;
    color:#00eaff;
    margin-bottom:20px;
}

textarea {
    width:100%;
    height:120px;
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(0,255,255,0.4);
    background:transparent;
    color:white;
    word-break: break-all;
}

textarea:focus {
    outline:none;
    box-shadow:0 0 12px cyan;
}

button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background: linear-gradient(90deg,#00eaff,#00ffb3);
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    box-shadow:0 0 20px cyan;
}

button:active {
    transform:scale(0.95);
}

.cards {
    display:flex;
    gap:10px;
    margin-top:20px;
}

.stat {
    flex:1;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
}

.safe { background:green; }
.phishing { background:red; }
.risk { background:orange; }

table {
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
    display:block;
    max-height:220px;
    overflow-y:auto;
}

th, td {
    border:1px solid #333;
    padding:10px;
    word-break: break-all;
}

.badge {
    padding:5px 10px;
    border-radius:8px;
}

.badge.safe { background:green; }
.badge.phishing { background:red; }
.badge.invalid { background:gray; }

.logout {
    position:absolute;
    top:20px;
    right:20px;
}

.logout a {
    color:#00eaff;
    text-decoration:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="logout">
    <a href="/login">Logout</a>
</div>

<div class="card">

<div class="logo">🧿 MEGHIX TRINETRA</div>
<div class="subtitle">URL PHISHING DETECTION SYSTEM</div>

<form method="POST">
<textarea name="urls" placeholder="Enter URLs (one per line)"></textarea>
<button type="submit">SCAN ➤</button>
</form>

{% if summary.total > 0 %}
<div class="cards">
    <div class="stat safe">Safe: {{ summary.safe }}</div>
    <div class="stat phishing">Phishing: {{ summary.phishing }}</div>
    <div class="stat risk">Risk: {{ summary.risk }}%</div>
</div>
{% endif %}

{% if results %}
<table>
<tr>
<th>URL</th>
<th>Status</th>
</tr>

{% for item in results %}
<tr>
<td>{{ item.url }}</td>
<td>
<span class="badge {{ item.label|lower }}">
{{ item.label }}
</span>
</td>
</tr>
{% endfor %}

</table>
{% endif %}

</div>

<script>
// BACKGROUND PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 70; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: Math.random() - 0.5,
        vy: Math.random() - 0.5
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {

        let p = particles[i];

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = "#00eaff";
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;

        for (let j = i + 1; j < particles.length; j++) {
            let p2 = particles[j];
            let dist = Math.hypot(p.x - p2.x, p.y - p2.y);

            if (dist < 120) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = "rgba(0,255,255,0.2)";
                ctx.stroke();
            }
        }

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
