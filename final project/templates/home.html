<!DOCTYPE html>
<html>
<head>
<title>Register - Meghix Trinetra</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    height:100vh;
    font-family:'Orbitron', sans-serif;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card {
    width:380px;
    padding:30px;
    border-radius:15px;
    background:rgba(10,20,40,0.7);
    backdrop-filter:blur(15px);
    border:1px solid rgba(0,255,255,0.3);
    box-shadow:0 0 20px rgba(0,255,255,0.3);
    text-align:center;
}

.logo {
    font-size:24px;
}

.subtitle {
    font-size:12px;
    color:#00eaff;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid cyan;
    background:transparent;
    color:white;
}

.input-box {
    position:relative;
}

.eye {
    position:absolute;
    right:10px;
    top:18px;
    cursor:pointer;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00eaff,#00ffb3);
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    box-shadow:0 0 15px cyan;
}

.success {
    margin-top:10px;
    color:lightgreen;
}

.error {
    margin-top:10px;
    color:red;
}

a {
    color:#00eaff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">🧿 MEGHIX TRINETRA</div>
<div class="subtitle">Create Account</div>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<div class="input-box">
<input type="password" id="pass1" name="password" placeholder="Password" required>
<span class="eye" onclick="togglePass('pass1')">👁</span>
</div>

<div class="input-box">
<input type="password" id="pass2" name="confirm_password" placeholder="Confirm Password" required>
<span class="eye" onclick="togglePass('pass2')">👁</span>
</div>

<button type="submit">REGISTER ➤</button>

{% if msg %}
<div class="success">{{ msg }}</div>
{% endif %}

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

</form>

<p style="margin-top:10px;">
Already have account? <a href="/login">Login</a>
</p>

</div>

<script>
function togglePass(id){
let p=document.getElementById(id);
p.type=p.type==="password"?"text":"password";
}
</script>

</body>
</html>
