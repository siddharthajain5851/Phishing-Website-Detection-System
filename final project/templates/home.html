<!DOCTYPE html>
<html>
<head>
    <title>Meghix Trinetra - Cloud Defense AI</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f9f9f9;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 2px;
        }

        .header h2 {
            margin: 5px;
            font-size: 18px;
            color: #444;
        }

        .header p {
            margin: 5px;
            color: gray;
            font-size: 14px;
        }

        /* CONTAINER */
        .container {
            width: 60%;
            margin: auto;
            text-align: center;
        }

        /* TEXTAREA (SEARCH BOX) */
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            text-align: center; /* 🔥 CENTER TEXT */
        }

        textarea::placeholder {
            text-align: center; /* 🔥 CENTER PLACEHOLDER */
        }

        /* BUTTON */
        button {
            padding: 12px 25px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .card {
            flex: 1;
            padding: 20px;
            color: white;
            text-align: center;
            font-weight: bold;
            border-radius: 12px;
            font-size: 16px;
        }

        .card.safe { background: #28a745; }
        .card.phishing { background: #dc3545; }
        .card.risk { background: #ff9800; }

        /* TABLE */
        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #111;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        /* BADGE */
        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .safe {
            background-color: green;
        }

        .phishing {
            background-color: red;
        }

    </style>
</head>

<body>

<div class="header">
    <h1>🧿 MEGHIX TRINETRA</h1>
    <h2>Cloud Defense AI</h2>
    <p>The Third Eye of Cybersecurity</p>
</div>

<div class="container">

<form method="POST">
    <textarea name="urls" placeholder="Enter URLs (one per line)"></textarea>
    <br>
    <button type="submit">Scan URLs</button>
</form>

{% if summary %}

<div class="cards">
    <div class="card safe">Safe: {{ summary.safe }}</div>
    <div class="card phishing">Phishing: {{ summary.phishing }}</div>
    <div class="card risk">Risk: {{ summary.risk }}%</div>
</div>

{% endif %}

{% if results %}

<table>
    <tr>
        <th>URL</th>
        <th>Status</th>
    </tr>

    {% for item in results %}
    <tr>
        <td>{{ item.url }}</td>
        <td>
            <span class="badge {{ 'safe' if item.label == 'Safe' else 'phishing' }}">
                {{ item.label }}
            </span>
        </td>
    </tr>
    {% endfor %}

</table>

{% endif %}

</div>

</body>
</html>
