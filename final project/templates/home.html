 <!DOCTYPE html>
<html>
<head>
    <title>Meghix Trinetra - Cybersecurity Tool</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .badge {
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .safe {
            background-color: green;
        }

        .phishing {
            background-color: red;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .cards {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .card {
            flex: 1;
            padding: 15px;
            color: white;
            text-align: center;
            font-weight: bold;
            border-radius: 10px;
        }

        .card.safe { background: green; }
        .card.phishing { background: red; }
        .card.risk { background: orange; }

        /* NEW HEADER STYLE */
        .header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
        }

        .header p {
            margin: 5px;
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🧿 Meghix Trinetra</h1>
    <h2> Cloud Defense AI </h2>
 <p>The third Eye Of Cyber Security</p>
</div>

<div class="container">

<form method="POST">
    <textarea name="urls" placeholder="Enter URLs (one per line)"></textarea>
    <button type="submit">Scan URLs</button>
</form>

{% if summary %}

<div class="cards">
    <div class="card safe">Safe: {{ summary.safe }}</div>
    <div class="card phishing">Phishing: {{ summary.phishing }}</div>
    <div class="card risk">Risk: {{ summary.risk }}%</div>
</div>

{% endif %}

{% if results %}

<table>
    <tr>
        <th>URL</th>
        <th>Status</th>
    </tr>

    {% for item in results %}
    <tr>
        <td>{{ item.url }}</td>
        <td>
            <span class="badge {{ 'safe' if item.label == 'Safe' else 'phishing' }}">
                {{ item.label }}
            </span>
        </td>
    </tr>
    {% endfor %}

</table>

{% endif %}

</div>

</body>
</html>
